name: DataOps-Main-Pipeline
on: [push] # The trigger: Runs every time you push code

jobs:
  Quality-Gate-and-Deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pandas requests 

      - name: Run Data Quality Check
        run: python validate.py # This is your gatekeeper!

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Deploy
        if: success() # Only runs if the Quality Check above passed
        run: |
          # The -migrate-state flag tells the robot to move to S3 without asking questions
          terraform init -input=false -migrate-state 
          terraform apply -auto-approve -input=false

      - name: Upload ETL Script to S3
        run: |
          aws s3 cp transform_to_parquet.py s3://siddhesh-dataops-lake-2026-v1/scripts/